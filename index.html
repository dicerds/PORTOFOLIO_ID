<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            /* Palet warna pastel yang lembut dan tidak bertabrakan */
            --bg-color: #FFF5E4; /* Krem lembut */
            --card-bg: #FFFFFF; /* Putih bersih */
            --text-color: #5C4646; /* Cokelat pastel untuk teks agar tidak terlalu kontras */
            --accent-color: #FF9494; /* Pink salmon lembut */
            --btn-hover: #FF7474; /* Pink sedikit lebih gelap untuk hover */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 148, 148, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cake-emoji {
            font-size: 80px;
            margin: 0;
            line-height: 1;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            cursor: pointer;
        }

        h1 {
            color: var(--accent-color);
            font-size: 28px;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 148, 148, 0.4);
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 148, 148, 0.6);
        }

        /* Animasi pop in untuk kotak kartu */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animasi memantul untuk kue */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="cake-emoji" onclick="fireConfetti()">🎂</div>
        <h1>Selamat Ulang Tahun!</h1>
        <p>Semoga sehat selalu, panjang umur, dan hari-harimu dipenuhi dengan banyak hal manis dan menyenangkan! ✨</p>
        <button class="btn" onclick="fireConfetti()">Klik untuk Kejutan! 🎉</button>
    </div>

    <script>
        // Fungsi untuk menembakkan confetti agar meriah
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // Efek confetti dari dua sisi (kiri dan kanan)
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // Jalankan efek confetti satu kali saat website pertama kali dibuka
        window.onload = function() {
            setTimeout(fireConfetti, 500); // delay setengah detik biar animasinya pas
        };
    </script>

</body>
</html>
